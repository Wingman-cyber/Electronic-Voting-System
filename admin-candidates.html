<!DOCTYPE html>
<html>
<head>
  <title>Manage Candidates</title>
  <link rel="stylesheet" href="css/admin-candidates.css">
</head>
<body>

<div class="container">

  <h2>👥 Manage Candidates</h2>

  <!-- 🔹 FORM -->
  <div class="form-card">
    <h3>Add Candidate</h3>

    <div class="form-group">
      <input type="text" id="name" placeholder="Candidate Name">
      <input type="text" id="party" placeholder="Party">
    </div>

    <div class="form-group">
      <input type="text" id="position" placeholder="Position (e.g President)">
      <input type="text" id="county" placeholder="County">
    </div>

    <button class="add-btn" onclick="addCandidate()">+ Add Candidate</button>
  </div>

  <!-- 🔹 LIST -->
  <div class="list-section">
    <h3>All Candidates</h3>
    <div id="candidateList"></div>
  </div>

</div>

<script type="module" src="js/admin-candidates.js"></script>

</body>
</html>
